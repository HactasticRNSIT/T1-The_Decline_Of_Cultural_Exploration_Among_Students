<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Leaderboard — EchoRoots</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .leaderboard-layout { display: flex; min-height: 100svh; }
    .main-content { flex: 1; padding: 40px; }
    
    .leaderboard-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 40px;
      max-width: 900px;
      margin: 0 auto;
      box-shadow: var(--shadow-xl);
    }
    
    .lb-header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .lb-title {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--saffron), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .top-three {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 30px;
      margin-bottom: 50px;
      padding-top: 20px;
    }

    .podium {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: var(--transition);
      cursor: pointer;
    }
    .podium:hover { transform: translateY(-5px); }

    .podium-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 4px solid var(--border);
      background: var(--bg-muted);
      margin-bottom: 15px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; font-weight: 800;
      position: relative;
    }
    .podium-rank {
      position: absolute;
      bottom: -8px;
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 800;
      color: white;
      border: 2px solid var(--bg-card);
    }

    .rank-1 .podium-avatar { width: 100px; height: 100px; border-color: #F59E0B; }
    .rank-1 .podium-rank { background: #F59E0B; }
    .rank-2 .podium-avatar { border-color: #94A3B8; }
    .rank-2 .podium-rank { background: #94A3B8; }
    .rank-3 .podium-avatar { border-color: #CD7C2F; }
    .rank-3 .podium-rank { background: #CD7C2F; }

    .lb-table {
      width: 100%;
      border-collapse: collapse;
    }
    .lb-row {
      display: grid;
      grid-template-columns: 60px 50px 1fr 100px 100px;
      align-items: center;
      padding: 16px 12px;
      border-bottom: 1px solid var(--border);
      transition: var(--transition);
      cursor: pointer;
    }
    .lb-row:hover { background: var(--bg-muted); border-radius: var(--radius-md); }
    .lb-row.me { background: rgba(249,115,22,0.05); }

    .lb-rank { font-family: var(--font-display); font-weight: 800; color: var(--text-muted); text-align: center; }
    .lb-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--bg-muted); display:flex; align-items:center; justify-content:center; overflow:hidden; font-weight:700; font-size:0.8rem; }
    .lb-name { font-weight: 600; padding-left: 10px; }
    .lb-stats { font-size: 0.85rem; color: var(--text-muted); text-align: right; }
    .lb-xp { font-family: var(--font-display); font-weight: 800; color: var(--saffron); text-align: right; }

    @media (max-width: 900px) {
      .main-content { margin-left: 0; padding: 20px; }
      .sidebar { display: none; }
      .leaderboard-container { padding: 20px; }
      .lb-row { grid-template-columns: 40px 40px 1fr 80px; }
      .lb-row span:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>

<div class="leaderboard-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="flex items-center gap-3">
        <a href="#" class="back-btn" style="margin:0;"><i class="fa-solid fa-arrow-left"></i></a>
        <a href="/" class="nav-logo">
          <div class="nav-logo-icon"><i class="fa-solid fa-location-dot" style="color:white;font-size:0.85rem;"></i></div>
          <span class="nav-logo-text">Echo<span>Roots</span></span>
        </a>
      </div>
    </div>
    <div class="sidebar-nav">
      <div class="sidebar-section-label">Main</div>
      <a href="dashboard.html" class="sidebar-nav-item"><i class="fa-solid fa-house"></i> <span>Dashboard</span></a>
      <a href="map.html" class="sidebar-nav-item"><i class="fa-solid fa-map-location-dot"></i> <span>Explore Map</span></a>
      <a href="ai-guide.html" class="sidebar-nav-item"><i class="fa-solid fa-robot"></i> <span>AI Guide</span></a>
      <a href="quests.html" class="sidebar-nav-item"><i class="fa-solid fa-trophy"></i> <span>Quests</span></a>
      <a href="events.html" class="sidebar-nav-item"><i class="fa-solid fa-calendar-days"></i> <span>Events</span></a>

      <div class="sidebar-section-label">Account</div>
      <a href="profile.html" class="sidebar-nav-item"><i class="fa-solid fa-user"></i> <span>Profile</span></a>
      <a href="admin.html" class="sidebar-nav-item admin-only" style="display:none;"><i class="fa-solid fa-lock"></i> <span>Admin Panel</span></a>
      <a href="#" class="sidebar-nav-item" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> <span>Logout</span></a>
    </div>
  </aside>

  <main class="main-content chat-container">
    <div class="leaderboard-container reveal">
      <div class="lb-header">
        <h1 class="lb-title">Global Hall of Fame</h1>
        <p style="color:var(--text-secondary);">Top cultural explorers across the EchoRoots community</p>
      </div>

      <div id="topThree" class="top-three">
        <!-- Podium injected -->
        <div class="spinner"></div>
      </div>

      <div class="lb-table">
        <div class="lb-row" style="border-bottom: 2px solid var(--border); cursor: default; background: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; color: var(--text-muted);">
          <span>Rank</span>
          <span></span>
          <span style="padding-left: 10px;">Explorer</span>
          <span style="text-align: right;">Level</span>
          <span style="text-align: right;">Total XP</span>
        </div>
        <div id="leaderboardFullList">
          <!-- List items injected -->
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="js/script.js"></script>
<script src="js/leaderboard.js"></script>
</body>
</html>
