<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — EchoRoots</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .admin-layout { display: flex; min-height: 100svh; }
    .main-content { flex: 1; padding: 40px; }
    
    #loginScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; width: 100%; padding: 20px;
      background: var(--bg);
    }
    .login-card {
      background: var(--bg-card); border: 1.5px solid var(--border);
      border-radius: var(--radius-lg); padding: 40px; width: 100%; max-width: 400px;
      box-shadow: var(--shadow-xl);
    }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 24px;
      display: flex; flex-direction: column; gap: 8px;
      transition: var(--transition);
    }
    .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
    .stat-icon { font-size: 1.8rem; margin-bottom: 8px; }
    .stat-value { font-family: var(--font-ui); font-size: 2.2rem; font-weight: 800; color: var(--text-primary); }
    .stat-label { font-size: 0.8rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }

    .event-admin-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 24px; margin-bottom: 20px;
      transition: var(--transition);
    }
    .event-admin-card:hover { border-color: var(--saffron); }

    @media (max-width: 900px) {
      .main-content { margin-left: 0; padding: 20px; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card reveal">
    <div style="text-align:center; margin-bottom:24px;">
      <div class="nav-logo-icon" style="margin:0 auto 16px; width:48px; height:48px; font-size:1.2rem;"><i class="fa-solid fa-shield-halved" style="color:white;"></i></div>
      <h2 style="font-family:var(--font-ui); font-weight:800;">Admin Central</h2>
      <p style="color:var(--text-muted); font-size:0.88rem;">Secure access for EchoRoots moderators</p>
    </div>
    <form id="loginForm" onsubmit="adminLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="adminEmail" class="form-input" placeholder="admin@echoroots.in" required />
      </div>
      <div class="form-group">
        <label>Secret Password</label>
        <input type="password" id="adminPassword" class="form-input" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary w-full" id="loginBtn" style="padding:12px; margin-top:10px;">
        <i class="fa-solid fa-unlock-keyhole"></i> Authorized Entry
      </button>
      <p class="login-error" id="loginError" style="color:red; font-size:0.8rem; margin-top:12px; text-align:center; display:none;"></p>
    </form>
  </div>
</div>

<div id="adminShell" class="admin-layout" style="display:none;">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="flex items-center gap-3">
        <a href="#" class="back-btn" style="margin:0;"><i class="fa-solid fa-arrow-left"></i></a>
        <a href="/" class="nav-logo">
          <div class="nav-logo-icon"><i class="fa-solid fa-location-dot" style="color:white;font-size:0.85rem;"></i></div>
          <span class="nav-logo-text">Echo<span>Roots</span></span>
        </a>
      </div>
    </div>
    <div class="sidebar-nav">
      <div class="sidebar-section-label">Administration</div>
      <a href="admin.html" class="sidebar-nav-item active"><i class="fa-solid fa-chart-line"></i> <span>Dashboard</span></a>
      <a href="admin-users.html" class="sidebar-nav-item"><i class="fa-solid fa-users"></i> <span>User Management</span></a>
      <a href="admin-events.html" class="sidebar-nav-item"><i class="fa-solid fa-calendar-check"></i> <span>Event Moderation</span></a>
      
      <div class="sidebar-section-label">Exit</div>
      <a href="dashboard.html" class="sidebar-nav-item"><i class="fa-solid fa-house"></i> <span>Back to Site</span></a>
      <a href="#" class="sidebar-nav-item" onclick="adminLogout()" style="color:var(--pink);"><i class="fa-solid fa-right-from-bracket"></i> <span>Secure Logout</span></a>
    </div>
  </aside>

  <main class="main-content chat-container">
    <div class="flex justify-between items-end" style="margin-bottom:32px;">
      <div>
        <h1 style="font-size:2.2rem; letter-spacing:-0.03em;">Platform Overview</h1>
        <p style="color:var(--text-muted);" id="adminNameBadge">Welcome back, Admin</p>
      </div>
      <button onclick="loadStats()" class="btn btn-secondary btn-sm"><i class="fa-solid fa-rotate"></i> Refresh Stats</button>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="spinner" style="margin:20px auto;"></div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="spinner" style="margin:20px auto;"></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>
<script src="js/script.js"></script>
<script>
  async function adminLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';
    document.getElementById('loginError').style.display = 'none';

    try {
      const res = await apiFetch('/api/auth/login', {
        method: 'POST',
        body: JSON.stringify({
          email: document.getElementById('adminEmail').value,
          password: document.getElementById('adminPassword').value
        })
      });

      if (res.success && res.data && res.data.token) {
        if (res.data.role !== 'admin') {
          document.getElementById('loginError').textContent = 'Access denied. Admin accounts only.';
          document.getElementById('loginError').style.display = 'block';
          return;
        }
        localStorage.setItem('er_token', res.data.token);
        localStorage.setItem('er_user', JSON.stringify(res.data));
        showAdminShell(res.data);
      } else {
        document.getElementById('loginError').textContent = res.message || 'Login failed.';
        document.getElementById('loginError').style.display = 'block';
      }
    } catch (err) {
      document.getElementById('loginError').textContent = 'Server error. Please try again.';
      document.getElementById('loginError').style.display = 'block';
    } finally {
      btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-unlock-keyhole"></i> Authorized Entry';
    }
  }

  function adminLogout() {
    localStorage.removeItem('er_token');
    localStorage.removeItem('er_user');
    location.reload();
  }

  function showAdminShell(user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminShell').style.display = 'flex';
    document.getElementById('adminNameBadge').textContent = 'Master Control: ' + user.name;
    loadStats();
    loadPendingEvents();
  }

  window.onload = function() {
    const token = getToken();
    const user = getUser();
    if (token && user && user.role === 'admin') {
      showAdminShell(user);
    }
  };

  async function loadStats() {
    try {
      const res = await apiFetch('/api/admin/stats');
      if (res.success) {
        const s = res.data.stats;
        document.getElementById('statsGrid').innerHTML = `
          <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div class="stat-value">${s.totalUsers}</div>
            <div class="stat-label">Total Explorers</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">📅</div>
            <div class="stat-value">${s.totalEvents}</div>
            <div class="stat-label">Total Events</div>
          </div>
          <div class="stat-card" style="cursor:pointer" onclick="location.href='admin-events.html'">
            <div class="stat-icon">⏳</div>
            <div class="stat-value" style="color:var(--saffron);">${s.pendingEvents}</div>
            <div class="stat-label">Pending Approval</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">💬</div>
            <div class="stat-value">${s.totalComments}</div>
            <div class="stat-label">Interactions</div>
          </div>
        `;
      }
    } catch (e) {}
  }

  async function loadPendingEvents() {
    // Moved to admin-events.html as per request
    return;
  }

  async function loadPendingEvents() {
    try {
      const res = await apiFetch('/api/admin/events/pending');
      if (res.success) {
        const events = res.data;
        document.getElementById('pendingBadge').textContent = events.length;
        const container = document.getElementById('pendingEventsList');
        if (events.length === 0) {
          container.innerHTML = '<div class="card" style="padding:40px; text-align:center; color:var(--text-muted);"><i class="fa-solid fa-circle-check" style="font-size:2rem; color:#10B981; margin-bottom:12px; display:block;"></i> Queue is empty. Great job!</div>';
          return;
        }
        container.innerHTML = events.map(ev => `
          <div class="event-admin-card reveal" id="ev-admin-${ev._id}">
            <div class="flex justify-between items-start" style="margin-bottom:16px;">
              <div>
                <h4 style="font-size:1.1rem; margin-bottom:4px;">${ev.title}</h4>
                <div style="font-size:0.8rem; color:var(--text-muted);"><i class="fa-solid fa-user"></i> By: ${[...(ev.organizers || []).map(o => o.name), ...(ev.coOrganizerNames || [])].join(', ') || 'Community Member'}</div>
              </div>
              <div class="badge badge-purple">${ev.category}</div>
            </div>
            <div style="display:flex; gap:24px; margin-bottom:16px; font-size:0.85rem; color:var(--text-secondary);">
              <span><i class="fa-solid fa-calendar"></i> ${new Date(ev.date).toLocaleDateString()}</span>
              <span><i class="fa-solid fa-location-dot"></i> ${ev.location?.city || 'Remote'}</span>
              <span><i class="fa-solid fa-ticket"></i> ${ev.price || 'Free'}</span>
            </div>
            <p style="font-size:0.9rem; line-height:1.6; color:var(--text-secondary); margin-bottom:20px;">${ev.description}</p>
            <div class="flex gap-3">
              <button class="btn btn-primary btn-sm" onclick="approveEvent('${ev._id}')" style="background:#10B981; border-color:#10B981;"><i class="fa-solid fa-check"></i> Approve</button>
              <button class="btn btn-secondary btn-sm" onclick="rejectEvent('${ev._id}')" style="color:#ef4444; border-color:#ef4444;"><i class="fa-solid fa-xmark"></i> Reject</button>
            </div>
          </div>
        `).join('');
        initScrollReveal();
      }
    } catch (e) {}
  }

  async function approveEvent(id) {
    try {
      const res = await apiFetch('/api/admin/events/' + id + '/approve', { method: 'POST' });
      if (res.success) {
        showToast('Event approved successfully');
        document.getElementById('ev-admin-' + id).style.opacity = '0';
        setTimeout(() => { document.getElementById('ev-admin-' + id).remove(); loadStats(); }, 300);
      }
    } catch (e) {}
  }

  async function rejectEvent(id) {
    const reason = prompt('Reason for rejection:');
    if (reason === null) return;
    try {
      const res = await apiFetch('/api/admin/events/' + id + '/reject', {
        method: 'POST',
        body: JSON.stringify({ reason: reason || 'Violation of guidelines.' })
      });
      if (res.success) {
        showToast('Event rejected');
        document.getElementById('ev-admin-' + id).remove();
        loadStats();
      }
    } catch (e) {}
  }
</script>
</body>
</html>
