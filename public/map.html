<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore Map — EchoRoots</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body, html { height: 100%; overflow: hidden; }

    .map-page { display: flex; height: 100svh; flex-direction: column; }

    .map-topbar {
      height: 64px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      flex-shrink: 0;
      z-index: 500;
    }

    .map-body { display: flex; flex: 1; overflow: hidden; }

    .map-sidebar {
      width: 320px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .map-sidebar-head {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .map-search {
      width: 100%;
      padding: 10px 40px 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-full);
      font-family: var(--font-sans);
      font-size: 0.88rem;
      background: var(--bg);
      color: var(--text-primary);
      outline: none;
      transition: var(--transition);
    }

    .map-search:focus { border-color: var(--saffron); }

    .map-container { flex: 1; position: relative; }

    #mainMap { width: 100%; height: 100%; }

    .place-list { padding: 16px; display: flex; flex-direction: column; gap: 10px; flex: 1; overflow-y: auto; }

    .place-list-item {
      padding: 14px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      cursor: pointer;
      transition: var(--transition);
    }

    .place-list-item:hover {
      border-color: var(--saffron);
      transform: translateX(3px);
    }

    .place-list-item.active {
      border-color: var(--saffron);
      background: rgba(249,115,22,0.03);
    }

    .cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    .map-place-popup {
      padding: 16px;
      min-width: 260px;
    }

    .map-floating-info {
      position: absolute;
      bottom: 24px;
      right: 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      box-shadow: var(--shadow-lg);
      z-index: 400;
      min-width: 220px;
      display: none;
    }

    .marker-pulse {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 3px solid white;
      position: relative;
    }

    .marker-pulse::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid;
      animation: markerPulse 2s infinite;
    }

    @keyframes markerPulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    @media(max-width:768px) {
      .map-sidebar { display: none; }
    }
  </style>
</head>
<body>

<div class="map-page">
  <!-- Top bar -->
  <div class="map-topbar">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon"><i class="fa-solid fa-location-dot" style="color:white;font-size:0.85rem;"></i></div>
      <span class="nav-logo-text">Echo<span>Roots</span></span>
    </a>
    <div style="flex:1;max-width:400px;position:relative;">
      <i class="fa-solid fa-magnifying-glass" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:0.85rem;"></i>
      <input type="text" class="map-search" placeholder="Search places, cities, categories..." id="mapSearchInput" />
    </div>
    <div class="filter-pills" style="flex-wrap:nowrap;">
      <button class="filter-pill active" data-category="all">All</button>
      <button class="filter-pill" data-category="heritage"><i class="fa-solid fa-landmark"></i> Heritage</button>
      <button class="filter-pill" data-category="museum"><i class="fa-solid fa-building-columns"></i> Museums</button>
      <button class="filter-pill" data-category="food"><i class="fa-solid fa-utensils"></i> Food</button>
      <button class="filter-pill" data-category="festival"><i class="fa-solid fa-music"></i> Festivals</button>
      <button class="filter-pill" data-category="hidden_gem"><i class="fa-solid fa-gem"></i> Hidden</button>
    </div>
    <div class="flex items-center gap-2" style="margin-left:auto;">
      <a href="dashboard.html" class="btn btn-ghost btn-sm"><i class="fa-solid fa-house"></i></a>
      <a href="login.html" class="btn btn-primary btn-sm">Dashboard</a>
    </div>
  </div>

  <div class="map-body">
    <!-- Sidebar -->
    <aside class="map-sidebar">
      <div class="map-sidebar-head">
        <div style="font-family:var(--font-ui);font-weight:700;font-size:0.95rem;margin-bottom:4px;">Cultural Places</div>
        <div style="font-size:0.8rem;color:var(--text-muted);" id="placeCount">Loading...</div>
      </div>
      <div class="place-list" id="placeList">
        <div style="text-align:center;padding:32px 16px;color:var(--text-muted);">
          <div class="spinner" style="margin:0 auto 12px;"></div>
          Loading places...
        </div>
      </div>
    </aside>

    <!-- Map -->
    <div class="map-container">
      <div id="mainMap"></div>
      <!-- Floating info card -->
      <div class="map-floating-info" id="floatingInfo">
        <div style="font-family:var(--font-ui);font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;">Selected Place</div>
        <div style="font-family:var(--font-ui);font-weight:700;font-size:0.97rem;margin-bottom:4px;" id="infoName">—</div>
        <div style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:12px;" id="infoMeta">—</div>
        <div class="flex gap-2">
          <a href="quests.html" class="btn btn-primary btn-sm" style="font-size:0.78rem;flex:1;justify-content:center;"><i class="fa-solid fa-trophy"></i> Quest</a>
          <button class="btn btn-secondary btn-sm" style="font-size:0.78rem;"><i class="fa-solid fa-bookmark"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/map.js"></script>
</body>
</html>
