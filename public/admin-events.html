<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Moderation — Admin — EchoRoots</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .admin-layout { display: flex; min-height: 100svh; }
    .main-content { flex: 1; padding: 40px; }
    @media (max-width: 900px) { .main-content { margin-left: 0; padding: 20px; } .sidebar { display: none; } }
    
    .event-mod-card {
      background: var(--bg-card); border: 1.5px solid var(--border);
      border-radius: var(--radius-lg); padding: 24px; margin-bottom: 24px;
      transition: var(--transition); position: relative; overflow: hidden;
    }
    .event-mod-card:hover { border-color: var(--saffron); box-shadow: var(--shadow-md); }
    .status-badge { position: absolute; top: 0; right: 0; padding: 6px 16px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; border-bottom-left-radius: 12px; }
    .status-pending { background: #FEF3C7; color: #D97706; }
    .status-approved { background: #D1FAE5; color: #059669; }
    .status-rejected { background: #FEE2E2; color: #DC2626; }
  </style>
</head>
<body>

<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="flex items-center gap-3">
        <a href="admin.html" class="back-btn" style="margin:0;"><i class="fa-solid fa-arrow-left"></i></a>
        <a href="/" class="nav-logo">
          <div class="nav-logo-icon"><i class="fa-solid fa-location-dot" style="color:white;font-size:0.85rem;"></i></div>
          <span class="nav-logo-text">Echo<span>Roots</span></span>
        </a>
      </div>
    </div>
    <div class="sidebar-nav">
      <div class="sidebar-section-label">Administration</div>
      <a href="admin.html" class="sidebar-nav-item"><i class="fa-solid fa-chart-line"></i> <span>Dashboard</span></a>
      <a href="admin-users.html" class="sidebar-nav-item"><i class="fa-solid fa-users"></i> <span>User Management</span></a>
      <a href="admin-events.html" class="sidebar-nav-item active"><i class="fa-solid fa-calendar-check"></i> <span>Event Moderation</span></a>
      
      <div class="sidebar-section-label">Exit</div>
      <a href="dashboard.html" class="sidebar-nav-item"><i class="fa-solid fa-house"></i> <span>Back to Site</span></a>
      <a href="#" class="sidebar-nav-item" id="logoutBtn" style="color:var(--pink);"><i class="fa-solid fa-right-from-bracket"></i> <span>Logout</span></a>
    </div>
  </aside>

  <main class="main-content">
    <div class="flex justify-between items-center" style="margin-bottom:32px;">
      <div>
        <h1 style="font-size:2rem; letter-spacing:-0.03em;">Event Moderation</h1>
        <p style="color:var(--text-muted);">Review and approve community cultural events</p>
      </div>
      <div class="flex gap-3">
        <select id="eventFilter" class="form-input" onchange="loadEvents()">
          <option value="pending">Pending Only</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
          <option value="all">All Events</option>
        </select>
      </div>
    </div>

    <div id="eventList">
      <!-- Dynamically loaded -->
      <div class="spinner" style="margin:40px auto;"></div>
    </div>

    <div id="emptyState" style="display:none; text-align:center; padding:80px;">
      <div style="font-size:3rem; color:var(--border); margin-bottom:16px;"><i class="fa-solid fa-calendar-check"></i></div>
      <h3 style="margin-bottom:8px;">All caught up!</h3>
      <p style="color:var(--text-muted);">No events require moderation at this time.</p>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>
<script src="js/script.js"></script>
<script>
  async function loadEvents() {
    const filter = document.getElementById('eventFilter').value;
    const container = document.getElementById('eventList');
    const empty = document.getElementById('emptyState');
    
    container.innerHTML = '<div class="spinner" style="margin:40px auto;"></div>';
    empty.style.display = 'none';

    try {
      const type = filter === 'pending' ? 'pending' : 'all';
      let endpoint = filter === 'pending' ? '/api/admin/events/pending' : `/api/admin/data?type=event&status=${filter === 'all' ? '' : filter}`;
      
      const res = await apiFetch(endpoint);
      if (res.success) {
        const events = res.data;
        if (events.length === 0) {
          container.innerHTML = '';
          empty.style.display = 'block';
          return;
        }

        container.innerHTML = events.map(ev => `
          <div class="event-mod-card reveal" id="ev-mod-${ev._id}">
            <div class="status-badge status-${ev.status}">${ev.status}</div>
            <div class="flex justify-between items-start" style="margin-bottom:16px; padding-right:80px;">
              <div>
                <h4 style="font-size:1.25rem; margin-bottom:6px;">${ev.title}</h4>
                <div style="font-size:0.85rem; color:var(--text-muted);">
                  <i class="fa-solid fa-user-circle"></i> Organizer: 
                  <strong>${[...(ev.organizers || []).map(o => o.name || 'Admin'), ...(ev.coOrganizerNames || [])].join(', ')}</strong>
                </div>
              </div>
              <div class="badge badge-saffron">${ev.category}</div>
            </div>
            
            <div style="display:flex; flex-wrap:wrap; gap:20px; margin-bottom:20px; font-size:0.88rem; color:var(--text-secondary);">
              <span><i class="fa-solid fa-calendar"></i> ${new Date(ev.date).toLocaleDateString()}</span>
              <span><i class="fa-solid fa-location-dot"></i> ${ev.location?.city || 'Remote'}</span>
              <span><i class="fa-solid fa-ticket"></i> ${ev.price || 'Free'}</span>
              <span><i class="fa-solid fa-clock"></i> Submitted: ${new Date(ev.createdAt).toLocaleDateString()}</span>
            </div>

            <p style="font-size:0.92rem; line-height:1.7; color:var(--text-secondary); margin-bottom:24px; padding:16px; background:var(--bg-muted); border-radius:12px;">
              ${ev.description}
            </p>

            <div class="flex gap-3">
              ${ev.status === 'pending' ? `
                <button class="btn btn-primary" onclick="approveEvent('${ev._id}')" style="background:#10B981; border:none; padding:10px 24px;">
                  <i class="fa-solid fa-check"></i> Approve Event
                </button>
                <button class="btn btn-secondary" onclick="rejectEvent('${ev._id}')" style="color:#ef4444; border-color:#ef4444; padding:10px 24px;">
                  <i class="fa-solid fa-xmark"></i> Reject
                </button>
              ` : `
                <button class="btn btn-secondary btn-sm" onclick="deleteEvent('${ev._id}')" style="color:var(--text-muted);">
                  <i class="fa-solid fa-trash"></i> Delete Permanent
                </button>
              `}
            </div>
          </div>
        `).join('');
        initScrollReveal();
      }
    } catch (e) {
      showToast('Failed to load events', 'error');
    }
  }

  async function approveEvent(id) {
    try {
      const res = await apiFetch('/api/admin/events/' + id + '/approve', { method: 'POST' });
      if (res.success) {
        showToast('Event approved');
        const card = document.getElementById('ev-mod-' + id);
        if (document.getElementById('eventFilter').value === 'pending') {
          card.style.opacity = '0';
          card.style.transform = 'scale(0.95)';
          setTimeout(() => { card.remove(); if (!document.querySelector('.event-mod-card')) loadEvents(); }, 300);
        } else {
          loadEvents();
        }
      }
    } catch (e) { showToast('Error approving event', 'error'); }
  }

  async function rejectEvent(id) {
    const reason = prompt('Reason for rejection:');
    if (reason === null) return;
    try {
      const res = await apiFetch('/api/admin/events/' + id + '/reject', {
        method: 'POST',
        body: JSON.stringify({ reason: reason || 'Violation of guidelines.' })
      });
      if (res.success) {
        showToast('Event rejected');
        loadEvents();
      }
    } catch (e) { showToast('Error rejecting event', 'error'); }
  }

  async function deleteEvent(id) {
    if (!confirm('Delete this event forever?')) return;
    try {
      const res = await apiFetch('/api/admin/delete', {
        method: 'POST',
        body: JSON.stringify({ type: 'event', id, remark: 'Admin moderation delete' })
      });
      if (res.success) {
        showToast('Event deleted');
        loadEvents();
      }
    } catch (e) { showToast('Error deleting event', 'error'); }
  }

  window.onload = function() {
    if (requireAuth()) {
      const user = getUser();
      if (user.role !== 'admin') window.location.href = 'dashboard.html';
      loadEvents();
    }
  };
</script>
</body>
</html>
